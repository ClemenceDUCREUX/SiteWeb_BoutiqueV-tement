<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panier — Loue le look</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/avenir" />
    <link rel="stylesheet" href="/assets/css/site.css" />
    <script src="/assets/js/partials.js" defer></script>
    <script src="/assets/js/cart.js" defer></script>
  </head>
  <body>
    <div id="navbar-host"></div>

    <main id="main" class="cart">
      <div class="container">
        <div class="shop-head" style="margin-bottom:12px">
          <div class="stack" style="gap:6px">
            <h1>Mon panier</h1>
            <p class="sub">Vérifie tes articles avant de passer au paiement.</p>
          </div>
          <button class="btn" id="clearCart" type="button">Vider</button>
        </div>

        <div class="cart-grid">
          <section>
            <div id="cartEmpty" class="card card__pad" hidden>
              <p style="margin:0 0 10px 0; font-weight:900;">Ton panier est vide</p>
              <p class="small" style="margin:0 0 14px 0;">
                Va dans la boutique et ajoute une tenue 🙂
              </p>
              <a class="btn btn--primary" href="/Sae/Boutique/boutique.html">Aller à la boutique</a>
            </div>

            <div id="cartList" class="cart-list"></div>
          </section>

          <aside class="cart-summary">
            <div class="card card__pad">
              <p class="filter-title" style="margin:0 0 10px 0;">Récapitulatif</p>
              <div class="summary-row"><span>Sous-total</span><strong id="subtotal">0 €</strong></div>
              <div class="summary-row"><span>Livraison</span><strong id="shipping">0 €</strong></div>
              <div style="height:1px; background:var(--line); margin:12px 0;"></div>
              <div class="summary-row" style="font-size:14px;">
                <span>Total</span><strong id="total">0 €</strong>
              </div>
              <button class="btn btn--primary" id="checkoutBtn" type="button" style="width:100%; margin-top:12px;">
                Passer au paiement
              </button>
              <p class="small" style="margin:10px 0 0 0;">
                Démo : panier en localStorage.
              </p>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <div id="footer-host"></div>
  </body>
</html>
