<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paiement — Loue le look</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/avenir" />
    <link rel="stylesheet" href="/assets/css/site.css" />
    <script src="/assets/js/partials.js" defer></script>
    <script src="/assets/js/checkout.js" defer></script>
  </head>
  <body>
    <div id="navbar-host"></div>

    <main id="main" class="cart">
      <div class="container">
        <div class="shop-head" style="margin-bottom:12px">
          <div class="stack" style="gap:6px">
            <h1>Paiement</h1>
            <p class="sub">Renseigne tes infos et valide (démo).</p>
          </div>
          <a class="btn" href="/Sae/Panier/panier.html">← Retour panier</a>
        </div>

        <div class="cart-grid">
          <section>
            <form id="checkoutForm" class="card card__pad" style="display:grid; gap:12px;">
              <p class="filter-title" style="margin:0;">Informations</p>

              <div class="field">
                <label for="name">Nom</label>
                <input id="name" type="text" required placeholder="Dupont" />
              </div>

              <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" required placeholder="toi@mail.com" />
              </div>

              <div class="field">
                <label for="address">Adresse</label>
                <input id="address" type="text" required placeholder="12 rue …" />
              </div>

              <div class="field">
                <label for="card">Carte</label>
                <input id="card" type="text" inputmode="numeric" minlength="16" maxlength="19" required placeholder="1234 5678 9012 3456" />
              </div>

              <button class="btn btn--primary" type="submit">Payer</button>
              <p class="small" style="margin:0;">Démo : aucune donnée n’est envoyée.</p>
            </form>
          </section>

          <aside class="cart-summary">
            <div class="card card__pad">
              <p class="filter-title" style="margin:0 0 10px 0;">Récap commande</p>
              <div id="orderSummary"></div>
              <div style="height:1px; background:var(--line); margin:12px 0;"></div>
              <div class="summary-row" style="font-size:14px;">
                <span>Total</span><strong id="orderTotal">0 €</strong>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <div id="footer-host"></div>
  </body>
</html>
